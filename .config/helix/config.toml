theme = "github_dark_high_contrast"

[editor]
line-number = "relative"
true-color = true 
undercurl = true
color-modes = true

[editor.statusline]
left = ["mode", "spacer", "version-control", "file-name"]
right = ["spinner", "spacer", "diagnostics", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "VISUAL"

[editor.indent-guides]
render = true

[editor.lsp]
display-inlay-hints = true
display-messages = true

[editor.soft-wrap]
enable = true

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]

# Colemak
n = "move_char_left"
e = "move_line_down"
i = "move_line_up"
o = "move_char_right"

h = "insert_mode"
H = "insert_at_line_start"

l = "open_below"
L = "open_above"

k = "move_next_word_end"
K = "move_next_long_word_end"

j = "search_next"
J = "search_prev"

[keys.normal.g]
n = "goto_line_start"
o = "goto_line_end"

[keys.normal.space.w]
n = "jump_view_left"
e = "jump_view_down"
i = "jump_view_up"
o = "jump_view_right"

[keys.select]
n = "extend_char_left"
e = "extend_line_down"
i = "extend_line_up"
o = "extend_char_right"

h = "insert_mode"
H = "insert_at_line_start"

l = "open_below"
L = "open_above"

k = "extend_next_word_end"
K = "extend_next_long_word_end"

j = "search_next"
J = "search_prev"

[keys.select.g]
n = "goto_line_start"
o = "goto_line_end"
