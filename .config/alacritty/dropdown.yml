shell:
  program: /bin/zsh
  args:
    - -c
    - "tmux attach -t Dropdown || tmux new -s Dropdown"

font:
  size: 13.0
  normal:
    family: MesloLGS NF

window:
  opacity: 1.0
  decorations: None
  dynamic_padding: false
  padding:
    y: 5
    x: 5

import:
  - ~/.config/alacritty/base16-windows-95.yml
