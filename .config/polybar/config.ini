[colors]
background = #00010409
background-alt = #263040
foreground = #FFF
primary = #F7FAFA
secondary = #8ABEB7
alert = #490202
disabled = #707880

[bar/bar]
height = 32pt

width = 64.3%

bottom = false

dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "MesloLGS NF:size=10.5;2"

modules-left = xworkspaces xwindow
modules-right = network memory cpu cpu-temperature date gpu-util gpu-temp gpu-power updates

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
tray-position = right

[module/xworkspaces]
type = internal/xworkspaces

label-active = %index%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %index%
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 50

[module/memory]
type = internal/memory
format-prefix = "󰍛 "
label = %percentage_used%%

[module/cpu]
type = internal/cpu
format-prefix = "󰻠 "
label = %percentage%%

[module/network]
type = internal/network
interface-type = wireless
label-connected = 󰖩 %downspeed%

[module/cpu-temperature]
type = internal/temperature
thermal-zone = 1
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input
label =  %temperature-c%

[module/date]
type = internal/date
interval = 1

date = %d %b | %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/gpu-util]
type = custom/script
exec = /bin/bash -c "echo  $(nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits)%"

[module/gpu-temp]
type = custom/script
exec = /bin/bash -c "echo  $(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits)°C"

[module/gpu-power]
type = custom/script
exec = /bin/bash -c "echo 󰠠 $(printf "%.0f" $(nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits))W"

[module/updates]
type = custom/script
exec = /bin/bash -c "echo 󰚰 $(cat $HOME/.config/polybar/updates | wc -l)"
label-maxlen = 5

[settings]
screenchange-reload = true
